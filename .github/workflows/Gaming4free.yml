name: Gaming4free Auto Renew

on:
#   schedule:
#     - cron: '0 */2 * * *'  # 每 2 小时自动运行一次
  workflow_dispatch:       # 保持手动触发，方便随时测试

permissions:
  contents: write

jobs:
  run_renewal:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: |
        npm install

    - name: Setup Chrome & Xvfb
      run: |
        # ubuntu-latest 预装 google-chrome-stable；确保存在并安装 Xvfb
        google-chrome --version || (sudo apt-get update && sudo apt-get install -y google-chrome-stable)
        sudo apt-get install -y xvfb

    - name: ⚙ 设置代理 (sing-box)
      continue-on-error: true
      env:
        NODE_LINK: ${{ secrets.NODE_LINK }}
      run: |
        bash <(wget -qO- https://main.ssss.nyc.mn/setup_proxy.sh)

    - name: Run Script
      env:
        PROXY: socks5://127.0.0.1:1080
        TG_TOKEN: ${{ secrets.TG_TOKEN }}      
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}  
        SERVERS: ${{ secrets.SERVERS }}  
      run: |
        # 使用 xvfb 运行以支持 puppeteer-real-browser 的图形化过盾模式
        xvfb-run -a node gaming4free.js

    - name: 🧽 清理进程和临时文件
      if: always()
      run: |
        pkill -f sing-box || true
        pkill -f chromedriver || true
        pkill -f chrome || true
        pkill -f Xvfb || true
        rm -f sing-box sing-box-config.json sing-box.log

    - name: 🧹 清理旧的工作流运行记录
      if: always()
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        runs=$(gh run list --workflow="${{ github.workflow }}" --limit=100 --json databaseId --jq '.[].databaseId')
        count=0
        for run_id in $runs; do
          count=$((count + 1))
          if [ $count -gt 1 ]; then
            echo "删除运行记录: $run_id"
            gh run delete $run_id || true
          fi
        done