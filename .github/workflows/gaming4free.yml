name: Gaming4free Auto Renew

on:
  workflow_dispatch:

# ⚠️ 必须添加权限配置，允许 Action 修改仓库文件
permissions:
  contents: write

jobs:
  run_renewal:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install seleniumbase requests
        
    - name: Setup Chrome
      run: |
        seleniumbase install chromedriver

    - name: Setup Proxy Tunnel (Xray-core)
      env:
        XRAY_CONFIG: ${{ secrets.XRAY_CONFIG }} 
      run: |
        # 下载并解压 Xray-core
        wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
        unzip -q Xray-linux-64.zip -d xray
        chmod +x xray/xray
        
        # 将 Github Secret 中的 JSON 写入配置文件
        echo "$XRAY_CONFIG" > xray/config.json
        
        # 后台启动 Xray
        nohup ./xray/xray run -c xray/config.json > xray.log 2>&1 &
        sleep 5
        
        # 测试 Xray 代理节点是否连通 (JSON中定义的本地端口是 10808)
        curl -il -x socks5://127.0.0.1:10808 https://api.ipify.org

    - name: Run Script
      env:
        # 这里的端口必须对应 JSON 里的 "port": 10808
        PROXY: socks5://127.0.0.1:10808
        TG_TOKEN: ${{ secrets.TG_TOKEN }}      
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}  
        SERVERS: ${{ secrets.SERVERS }}  
      run: |
        # 使用 xvfb 运行以支持强力过人机验证模式
        xvfb-run -a python gaming4free.py
